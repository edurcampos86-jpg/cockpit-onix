# Railway cron schedules para o Painel do Dia
#
# Todos horários em UTC (Bahia = UTC-3, sem horário de verão).
#
# Crons disparam HTTP GET contra as rotas /api/cron/* com o header
# Authorization: Bearer $CRON_SECRET. Se CRON_SECRET estiver vazio,
# cron-guard.ts libera (modo dev).

[deploy]
startCommand = "prisma db push --accept-data-loss && next start"
# ────────────────────────────────────────────────────────────────────────
# Sug 1 — Boot do Dia: gera sugestões de 3 prioridades
#   Segunda a sexta, 07:30 Bahia = 10:30 UTC
# ────────────────────────────────────────────────────────────────────────
[[crons]]
name = "boot-do-dia"
schedule = "30 10 * * 1-5"
command = "curl -fsS -H \"Authorization: Bearer $CRON_SECRET\" $RAILWAY_PUBLIC_DOMAIN/api/cron/boot-do-dia"

# ────────────────────────────────────────────────────────────────────────
# Sug 3 — Auto-encerramento pós-reunião: varre agenda a cada 15min
# ────────────────────────────────────────────────────────────────────────
[[crons]]
name = "auto-encerrar"
schedule = "*/15 * * * *"
command = "curl -fsS -H \"Authorization: Bearer $CRON_SECRET\" $RAILWAY_PUBLIC_DOMAIN/api/cron/auto-encerrar"

# ────────────────────────────────────────────────────────────────────────
# Sug 4 — Triagem AI de e-mails: classifica inbox a cada 15min
# ────────────────────────────────────────────────────────────────────────
[[crons]]
name = "triar-emails"
schedule = "*/15 * * * *"
command = "curl -fsS -H \"Authorization: Bearer $CRON_SECRET\" $RAILWAY_PUBLIC_DOMAIN/api/cron/triar-emails"

# ────────────────────────────────────────────────────────────────────────
# Sug 5 — Retrospectiva semanal: Domingo 20:00 Bahia = 23:00 UTC
# ────────────────────────────────────────────────────────────────────────
[[crons]]
name = "retrospectiva-semanal"
schedule = "0 23 * * 0"
command = "curl -fsS -H \"Authorization: Bearer $CRON_SECRET\" $RAILWAY_PUBLIC_DOMAIN/api/cron/retrospectiva-semanal"

# ────────────────────────────────────────────────────────────────────────
# DataCrazy polling — fallback se webhook falhar.
# Roda a cada 5 minutos. Idempotente via externalId.
# ────────────────────────────────────────────────────────────────────────
[[crons]]
name = "datacrazy-poll"
schedule = "*/5 * * * *"
command = "curl -fsS -H \"Authorization: Bearer $CRON_SECRET\" $RAILWAY_PUBLIC_DOMAIN/api/cron/datacrazy-poll"

# ────────────────────────────────────────────────────────────────────────
# Google Calendar polling — sincroniza próxima e última reunião dos clientes
# a partir dos eventos do Google Calendar (match por e-mail do attendee).
# A cada 15min. Lookahead 60 dias / lookback 7 dias.
# ────────────────────────────────────────────────────────────────────────
[[crons]]
name = "google-calendar-poll"
schedule = "*/15 * * * *"
command = "curl -fsS -H \"Authorization: Bearer $CRON_SECRET\" $RAILWAY_PUBLIC_DOMAIN/api/cron/google-calendar-poll"

# ────────────────────────────────────────────────────────────────────────
# Datacrazy Atividades polling — reuniões marcadas/realizadas registradas
# direto no CRM Datacrazy (separadas das mensagens de WhatsApp). A cada
# 30min porque atividades mudam menos frequentemente que mensagens.
# Lookahead 60 dias / lookback 30 dias.
# ────────────────────────────────────────────────────────────────────────
[[crons]]
name = "datacrazy-atividades-poll"
schedule = "*/30 * * * *"
command = "curl -fsS -H \"Authorization: Bearer $CRON_SECRET\" $RAILWAY_PUBLIC_DOMAIN/api/cron/datacrazy-atividades-poll"

# ────────────────────────────────────────────────────────────────────────
# Outlook ICS polling — reuniões marcadas no Outlook (calendário publicado).
# A cada 30min. Lookahead 60 dias / lookback 7 dias. Pré-requisito:
# OUTLOOK_ICS_URL configurada em Config (URL pública do .ics).
# ────────────────────────────────────────────────────────────────────────
[[crons]]
name = "outlook-poll"
schedule = "*/30 * * * *"
command = "curl -fsS -H \"Authorization: Bearer $CRON_SECRET\" $RAILWAY_PUBLIC_DOMAIN/api/cron/outlook-poll"
