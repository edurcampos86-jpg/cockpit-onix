name: actionlint

# Valida a sintaxe de todos os workflows em toda PR.
# Sem path filter de propósito: rodar sempre (custa segundos) permite
# torná-lo required check sem o deadlock de "check expected que nunca roda".
on:
  pull_request:

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run actionlint
        run: |
          bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/v1.7.7/scripts/download-actionlint.bash) 1.7.7
          # Integração com shellcheck ativa (ubuntu-latest já traz o binário).
          # A dívida de estilo pré-existente (SC2129 nos redirects; SC2016 no
          # JMESPath) foi saneada, então validamos sintaxe/schema + scripts de run.
          ./actionlint -color -shellcheck=shellcheck
