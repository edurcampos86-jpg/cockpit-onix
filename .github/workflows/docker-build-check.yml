name: docker-build-check
on:
  pull_request:
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "railway.toml"
      - ".github/workflows/docker-build-check.yml"
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t cockpit-onix:ci .
      - name: Verify pg_dump present (major 16)
        run: |
          ver="$(docker run --rm --entrypoint pg_dump cockpit-onix:ci --version)"
          echo "$ver"
          echo "$ver" | grep -q 'PostgreSQL) 16' || { echo "ERRO: pg_dump nao e major 16"; exit 1; }
      - name: Verify startCommand binaries resolvem no PATH (prisma/next)
        # O Railway roda `prisma migrate deploy && next start` via sh. Se
        # node_modules/.bin nao estiver no PATH da imagem, o boot sai com
        # `sh: prisma: not found` (deploy FAILED, build verde). Reproduz aqui.
        run: |
          docker run --rm --entrypoint sh cockpit-onix:ci -c \
            'command -v prisma && command -v next' \
            || { echo "ERRO: prisma/next nao estao no PATH da imagem"; exit 1; }
