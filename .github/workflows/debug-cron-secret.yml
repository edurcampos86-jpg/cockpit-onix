name: Debug CRON_SECRET length

# TEMPORÁRIO — diagnóstico de divergência entre CRON_SECRET no GitHub
# Actions e no Railway. Não loga o valor, só metadados (length, primeiro
# e último char com codepoint) suficientes pra detectar whitespace ou
# aspas invisíveis. Remover após diagnóstico.

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Inspect secret metadata
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "${CRON_SECRET:-}" ]; then
            echo "::error::CRON_SECRET nao definido no GitHub Actions"
            exit 1
          fi
          LEN=${#CRON_SECRET}
          FIRST="${CRON_SECRET:0:1}"
          LAST="${CRON_SECRET: -1}"
          FIRST_CP=$(printf '%d' "'$FIRST")
          LAST_CP=$(printf '%d' "'$LAST")
          echo "::notice::CRON_SECRET length=$LEN"
          echo "::notice::first char codepoint=$FIRST_CP last char codepoint=$LAST_CP"
          # SHA-256 do valor (irreversível) — pra comparar com hash do valor
          # do Railway se Eduardo quiser confirmar igualdade sem expor.
          HASH=$(printf '%s' "$CRON_SECRET" | sha256sum | cut -d' ' -f1)
          echo "::notice::sha256=$HASH"
