name: Cockpit Crons

# Substitui os [[crons]] do railway.toml, que o Railway parou de processar
# (a doc atual só fala em `cronSchedule` singular per-service, e o canvas
# do projeto não tem services dedicados a cron).
#
# Cada schedule abaixo dispara o workflow inteiro. O job `dispatch` lê
# `github.event.schedule` e decide quais endpoints chamar — assim mantemos
# UM workflow só (mais fácil de manter que 5+ arquivos).
#
# Setup necessário (1 vez):
# - Repo Settings → Secrets and variables → Actions:
#   - Secret  CRON_SECRET   (mesmo valor que vai no Railway Variables)
#   - Variable APP_BASE_URL (ex: https://cockpit-onix-app-production.up.railway.app)
#
# workflow_dispatch permite disparar manualmente da aba Actions.

on:
  schedule:
    - cron: '*/5 * * * *'   # datacrazy-poll (mensagens WhatsApp)
    - cron: '*/15 * * * *'  # google-calendar-poll + auto-encerrar + triar-emails
    - cron: '*/30 * * * *'  # outlook-poll + datacrazy-atividades-poll + integration-audit
    - cron: '30 10 * * 1-5' # boot-do-dia (seg-sex 07:30 Bahia / 10:30 UTC)
    - cron: '0 23 * * 0'    # retrospectiva-semanal (dom 20:00 Bahia / 23:00 UTC)
    - cron: '0 4 * * 2'     # btg-movements-poll (ter 01:00 Bahia / 04:00 UTC — fora de pico)
    - cron: '0 9 * * *'     # btg-balances-poll (diário 06:00 Bahia / 09:00 UTC — saldoConta)
    - cron: '0 7 * * 0'     # btg-cadastral-poll (dom 04:00 Bahia / 07:00 UTC — off-peak, incremental)
    # Backup do Postgres e restore drill vivem em workflows próprios:
    # .github/workflows/db-backup.yml (06:00 UTC diário, faz pg_dump direto sem
    # depender da app) e .github/workflows/restore-drill.yml (segunda 07:00 UTC).
    # Os schedules 0 7 * * * (backup-daily) e 0 8 1 * * (backup-restore-test)
    # foram removidos daqui — chamavam endpoints inexistentes em produção.
  workflow_dispatch:
    inputs:
      paths:
        description: 'Paths separados por espaço (ex: "/api/cron/datacrazy-poll /api/cron/outlook-poll"). Vazio = roda todos.'
        required: false
        default: ''

concurrency:
  # Evita runs paralelos do MESMO schedule (se o anterior demorar mais que
  # o intervalo). Schedules diferentes continuam podendo rodar em paralelo.
  group: cron-${{ github.event.schedule || github.event.inputs.paths }}
  cancel-in-progress: false

jobs:
  dispatch:
    runs-on: ubuntu-latest
    # 12min: btg-cadastral-poll pode levar ~9min (rate limit 55/min). Os demais
    # schedules terminam em segundos.
    timeout-minutes: 12
    steps:
      - name: Resolve paths
        id: resolve
        run: |
          SCHEDULE='${{ github.event.schedule }}'
          MANUAL='${{ github.event.inputs.paths }}'
          if [ -n "$MANUAL" ]; then
            PATHS="$MANUAL"
          else
            case "$SCHEDULE" in
              "*/5 * * * *")
                PATHS="/api/cron/datacrazy-poll"
                ;;
              "*/15 * * * *")
                PATHS="/api/cron/google-calendar-poll /api/cron/auto-encerrar /api/cron/triar-emails"
                ;;
              "*/30 * * * *")
                PATHS="/api/cron/outlook-poll /api/cron/datacrazy-atividades-poll /api/cron/juridico-email-poll /api/cron/integration-audit"
                ;;
              "30 10 * * 1-5")
                PATHS="/api/cron/boot-do-dia"
                ;;
              "0 23 * * 0")
                PATHS="/api/cron/retrospectiva-semanal"
                ;;
              "0 4 * * 2")
                PATHS="/api/cron/btg-movements-poll"
                ;;
              "0 9 * * *")
                PATHS="/api/cron/btg-balances-poll"
                ;;
              "0 7 * * 0")
                PATHS="/api/cron/btg-cadastral-poll"
                ;;
              *)
                echo "Schedule '$SCHEDULE' não mapeado — nenhum endpoint executado."
                PATHS=""
                ;;
            esac
          fi
          echo "paths=$PATHS" >> "$GITHUB_OUTPUT"
          echo "Vai disparar: $PATHS"

      - name: Hit endpoints
        if: steps.resolve.outputs.paths != ''
        env:
          BASE_URL: ${{ vars.APP_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$BASE_URL" ]; then
            echo "::error::APP_BASE_URL não configurado (Repo Settings → Variables)"
            exit 1
          fi
          FAIL=0
          # Salva a última resposta em /tmp/last_*.txt (persiste entre steps no
          # mesmo job). Step "Notify Slack — BTG" consome esses arquivos quando
          # o schedule do dia é o cron weekly BTG (1 path só, sem ambiguidade).
          for path in ${{ steps.resolve.outputs.paths }}; do
            URL="${BASE_URL}${path}"
            echo "[$(date '+%H:%M:%S')] GET $URL"
            # btg-cadastral-poll é rate-limited (55/min) e processa ~480 contas
            # por run → precisa de janela maior. Os demais paths terminam em
            # segundos; 120s é teto de segurança.
            case "$path" in
              */btg-cadastral-poll) MAXT=540 ;;
              *) MAXT=120 ;;
            esac
            HTTP_CODE=$(curl -fsS -o /tmp/resp.txt -w "%{http_code}" \
              -H "Authorization: Bearer ${CRON_SECRET}" \
              --max-time "$MAXT" \
              "$URL") || HTTP_CODE="000"
            BODY=$(cat /tmp/resp.txt 2>/dev/null | head -c 2000)
            echo "  → HTTP $HTTP_CODE"
            echo "  → body: $BODY"
            echo "$HTTP_CODE" > /tmp/last_code.txt
            echo "$path"      > /tmp/last_path.txt
            if [ "$HTTP_CODE" != "200" ]; then
              echo "::warning::$path retornou HTTP $HTTP_CODE"
              FAIL=$((FAIL+1))
            fi
          done
          if [ "$FAIL" -gt 0 ]; then
            echo "::warning::$FAIL endpoint(s) falharam neste tick"
          fi
          # Não usamos exit 1 mesmo com falhas — não queremos que GitHub
          # mande email a cada blip de rede. Acompanhar via logs do workflow
          # e /api/backoffice/sync-logs no Cockpit.

      # ─────────────────────────────────────────────────────────────────
      # Notify Slack — APENAS para o cron semanal BTG.
      #
      # Único cron deste workflow com notificação Slack. Justificativa:
      # BTG é semanal (não roda a cada 5/15/30min), então o sinal não vira
      # ruído. E é a única integração onde silêncio = perda de dado
      # invisível — sem o ping, MovimentacaoBtg pode ficar vazia por
      # semanas sem ninguém notar.
      #
      # Sucesso E falha são notificados (não só falha): Eduardo quer ver
      # vida do cron pelo menos 1x/semana. Mensagens distintas pra não
      # confundir com smoke alerts.
      # ─────────────────────────────────────────────────────────────────

      - name: Notify Slack — BTG sync semanal
        if: always() && contains(steps.resolve.outputs.paths, '/api/cron/btg-movements-poll')
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL não configurado — pulando."
            exit 0
          fi
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          CODE=$(cat /tmp/last_code.txt 2>/dev/null || echo "000")
          BODY=$(cat /tmp/resp.txt 2>/dev/null || echo "")

          # Tenta parsear o body como JSON (resposta do handler). Se falhar,
          # cai pra erro de transporte (HTTP != 200).
          OK=$(echo "$BODY" | jq -r '.ok // false' 2>/dev/null || echo "false")
          CREATED=$(echo "$BODY" | jq -r '.recordsCreated // 0' 2>/dev/null || echo "0")
          SKIPPED=$(echo "$BODY" | jq -r '.recordsSkipped // 0' 2>/dev/null || echo "0")
          ORPHANED=$(echo "$BODY" | jq -r '.recordsOrphaned // 0' 2>/dev/null || echo "0")
          DURATION=$(echo "$BODY" | jq -r '.durationMs // 0' 2>/dev/null || echo "0")
          ERR_MSG=$(echo "$BODY" | jq -r '.errorMessage // (.errors[0].motivo // "")' 2>/dev/null || echo "")

          if [ "$CODE" = "200" ] && [ "$OK" = "true" ]; then
            MSG=":white_check_mark: BTG sync semanal — *${CREATED}* movimentações novas, ${SKIPPED} duplicadas, ${ORPHANED} órfãs · ${DURATION}ms · <${RUN_URL}|run>"
          else
            FIRST_ERR="${ERR_MSG:-HTTP $CODE}"
            # Trunca pra evitar mensagem gigante no Slack
            FIRST_ERR=$(echo "$FIRST_ERR" | head -c 300)
            MSG=":rotating_light: *BTG SYNC FALHOU* — backup semanal de movimentações não rodou
          Erro: \`${FIRST_ERR}\`
          Run: <${RUN_URL}|ver detalhes>
          Próxima tentativa: terça que vem 04:00 UTC"
          fi

          PAYLOAD=$(jq -n --arg text "$MSG" '{text: $text}')
          curl -fsS -X POST -H 'Content-Type: application/json' \
            -d "$PAYLOAD" "$SLACK_WEBHOOK_URL" \
            && echo "Slack notificado." \
            || echo "::warning::Falha ao postar no Slack — verificar SLACK_WEBHOOK_URL"
